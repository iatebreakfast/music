<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>American Billboard Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-box">ABM</span>
        <span class="logo-text">American Billboard Music</span>
      </div>
      <p class="tagline">Billboard Hot 100 · 1946 – 2020</p>
    </div>
  </header>

  <main class="main">

    <section class="decade-nav-section">
      <h2 class="section-label">Browse by Decade</h2>
      <nav class="decade-nav" id="decadeNav">
        <button class="decade-btn" data-decade="1940">1940s</button>
        <button class="decade-btn" data-decade="1950">1950s</button>
        <button class="decade-btn" data-decade="1960">1960s</button>
        <button class="decade-btn" data-decade="1970">1970s</button>
        <button class="decade-btn" data-decade="1980">1980s</button>
        <button class="decade-btn" data-decade="1990">1990s</button>
        <button class="decade-btn" data-decade="2000">2000s</button>
        <button class="decade-btn" data-decade="2010">2010s</button>
      </nav>
    </section>

    <section class="year-section" id="yearSection" hidden>
      <div class="year-section-header">
        <h2 class="section-label" id="decadeTitle"></h2>
      </div>
      <div class="year-grid" id="yearGrid"></div>
    </section>

    <section class="player-section" id="playerSection" hidden>
      <div class="player-header">
        <button class="back-btn" id="backBtn">← Back to years</button>
        <h2 class="player-title" id="playerTitle"></h2>
      </div>
      <div class="player-container" id="playerContainer"></div>
    </section>

    <section class="hero" id="hero">
      <div class="hero-inner">

        <!-- Record player hero illustration -->
        <svg class="hero-svg" viewBox="0 0 580 210" xmlns="http://www.w3.org/2000/svg">
          <rect width="580" height="210" fill="#3A9D8C"/>
          <!-- Scan-line texture -->
          <line x1="0" y1="6"   x2="580" y2="6"   stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="12"  x2="580" y2="12"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="18"  x2="580" y2="18"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="24"  x2="580" y2="24"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="30"  x2="580" y2="30"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="36"  x2="580" y2="36"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="42"  x2="580" y2="42"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="48"  x2="580" y2="48"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="54"  x2="580" y2="54"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="60"  x2="580" y2="60"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="66"  x2="580" y2="66"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="72"  x2="580" y2="72"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="78"  x2="580" y2="78"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="84"  x2="580" y2="84"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="90"  x2="580" y2="90"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="96"  x2="580" y2="96"  stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="102" x2="580" y2="102" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="108" x2="580" y2="108" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="114" x2="580" y2="114" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="120" x2="580" y2="120" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="126" x2="580" y2="126" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="132" x2="580" y2="132" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="138" x2="580" y2="138" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="144" x2="580" y2="144" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="150" x2="580" y2="150" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="156" x2="580" y2="156" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="162" x2="580" y2="162" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="168" x2="580" y2="168" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="174" x2="580" y2="174" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="180" x2="580" y2="180" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="186" x2="580" y2="186" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="192" x2="580" y2="192" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="198" x2="580" y2="198" stroke="#000" stroke-width=".7" opacity=".05"/>
          <line x1="0" y1="204" x2="580" y2="204" stroke="#000" stroke-width=".7" opacity=".05"/>
          <!-- Vinyl record -->
          <circle cx="155" cy="105" r="100" fill="#C8471A"/>
          <circle cx="155" cy="105" r="93" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="86" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="79" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="72" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="65" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="58" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="51" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="44" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="37" fill="none" stroke="#1C1C1C" stroke-width=".9" opacity=".28"/>
          <circle cx="155" cy="105" r="30" fill="#EDE0C4"/>
          <circle cx="155" cy="105" r="26" fill="none" stroke="#1C1C1C" stroke-width=".6" opacity=".2"/>
          <circle cx="155" cy="105" r="6"  fill="#1C1C1C"/>
          <circle cx="155" cy="105" r="2.5" fill="#C8471A"/>
          <!-- Tonearm -->
          <rect x="300" y="49" width="28" height="14" rx="2" fill="#1C1C1C" transform="rotate(-45 314 56)"/>
          <line x1="300" y1="70" x2="243" y2="127" stroke="#1C1C1C" stroke-width="8" stroke-linecap="butt"/>
          <rect x="237" y="117" width="22" height="10" rx="1" fill="#1C1C1C" transform="rotate(-45 248 122)"/>
          <line x1="241" y1="129" x2="238" y2="139" stroke="#1C1C1C" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="300" cy="70" r="14" fill="#1C1C1C"/>
          <circle cx="300" cy="70" r="7" fill="#2A8070"/>
          <line x1="322" y1="55" x2="322" y2="90" stroke="#1C1C1C" stroke-width="3.5" stroke-linecap="round"/>
          <rect x="314" y="86" width="16" height="8" rx="2" fill="#1C1C1C"/>
          <circle cx="342" cy="128" r="18" fill="none" stroke="#1C1C1C" stroke-width="2.5"/>
          <circle cx="342" cy="128" r="7" fill="#1C1C1C"/>
          <line x1="342" y1="110" x2="342" y2="119" stroke="#1C1C1C" stroke-width="2.5"/>
          <!-- Label box — solid black, two-line, high contrast -->
          <rect x="393" y="36" width="178" height="56" fill="#0D0D0D"/>
          <rect x="388" y="30" width="178" height="56" fill="#1C1C1C"/>
          <rect x="393" y="35" width="168" height="46" fill="none" stroke="#EDE0C4" stroke-width="1.8"/>
          <text x="477" y="55" font-family="Anton, sans-serif" font-size="18" fill="#EDE0C4" text-anchor="middle" letter-spacing="5">BILLBOARD</text>
          <line x1="405" y1="60" x2="549" y2="60" stroke="#EDE0C4" stroke-width=".8" opacity=".35"/>
          <text x="477" y="76" font-family="Anton, sans-serif" font-size="18" fill="#C8471A" text-anchor="middle" letter-spacing="8">HOT 100</text>
          <!-- Main headline -->
          <text x="390" y="125" font-family="Anton, sans-serif" font-size="52" fill="#EDE0C4" letter-spacing="2">EVERY</text>
          <text x="390" y="174" font-family="Anton, sans-serif" font-size="52" fill="#1C1C1C" letter-spacing="2">HIT.</text>
          <text x="390" y="198" font-family="Anton, sans-serif" font-size="14" fill="#EDE0C4" letter-spacing="6" opacity=".65">EVERY YEAR</text>
        </svg>

        <div class="hero-stats">
          <div class="stat">
            <span class="stat-num">68</span>
            <span class="stat-label">Years covered</span>
          </div>
          <div class="stat">
            <span class="stat-num">6,800+</span>
            <span class="stat-label">Songs available</span>
          </div>
          <div class="stat">
            <span class="stat-num">8</span>
            <span class="stat-label">Decades of music</span>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>American Billboard Music &nbsp;·&nbsp; Billboard Hot 100 historical archive</p>
    <a class="bmc-btn" href="https://www.buymeacoffee.com/iatebreakfast" target="_blank" rel="noopener">
      ☕ Buy me a coffee
    </a>
  </footer>

  <script src="player.js"></script>
</body>
</html>
